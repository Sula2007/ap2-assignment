version: '3.8'

services:

  # ── Message Broker ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Databases ───────────────────────────────────────────────────────────────
  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  payment-db:
    image: postgres:15
    container_name: payment-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  notification-db:
    image: postgres:15
    container_name: notification-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    ports:
      - "5434:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
      - ./notification-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Services ────────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: "host=order-db port=5432 user=postgres password=postgres dbname=order_db sslmode=disable"
      PAYMENT_SERVICE_URL: "http://payment-service:8081"
    depends_on:
      order-db:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: "host=payment-db port=5432 user=postgres password=postgres dbname=payment_db sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    environment:
      DATABASE_URL: "host=notification-db port=5432 user=postgres password=postgres dbname=notification_db sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  order-db-data:
  payment-db-data:
  notification-db-data:
