version: '3.8'

services:
  postgres-order:
    image: postgres:15
    container_name: postgres-order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d

  postgres-payment:
    image: postgres:15
    container_name: postgres-payment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d

  payment-service:
    build: ./payment-service
    container_name: payment-service
    env_file: ./payment-service/.env
    environment:
      DB_HOST: postgres-payment
      DB_PORT: 5432
    ports:
      - "8081:8081"
      - "50051:50051"
    depends_on:
      - postgres-payment

  order-service:
    build: ./order-service
    container_name: order-service
    env_file: ./order-service/.env
    environment:
      DB_HOST: postgres-order
      DB_PORT: 5432
      PAYMENT_GRPC_ADDR: payment-service:50051
    ports:
      - "8082:8082"
      - "50052:50052"
    depends_on:
      - postgres-order
      - payment-service

volumes:
  order-db-data:
  payment-db-data:
